kind = "web"
previewPath = "/"
title = "Duo Label"
version = "1.0.0"
id = "artifacts/duo-label"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21785

[services.development]
run = "pnpm --filter @workspace/duo-label run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/duo-label", "run", "build" ]
publicDir = "artifacts/duo-label/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21785"
BASE_PATH = "/"
